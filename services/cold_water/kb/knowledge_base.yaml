version: 1.0.0
reviewed_by_expert: false
symptoms:
- id: SYM_A_NO_WATER_AT_ALL
  code: А
  title: Нет воды совсем
  description: Ни из горячего, ни из холодного крана вода не идёт
  note: Проверить оба крана — иногда жилец пробовал только один
  hot_tap_temp: no_water
  cold_water_present: false
  primary_factors:
  - id: F_NO_COLD_NO_HOT
    type: primary
    description: Нет ни горячей, ни холодной воды
    note: Отличает от симптома Б, где холодная есть
  secondary_factors:
  - id: SF_NEIGHBORS_NO_WATER
    type: scope
    description: Соседи тоже без воды
    eliciting_question: У соседей тоже воды нет?
    note: Если да — авария/отключение на вводе в дом
  - id: SF_DURATION_NO_WATER
    type: temporal
    description: Как давно нет воды
    eliciting_question: Когда именно пропала — сегодня, вчера?
    note: null
  possible_causes:
  - id: C_A1_PLANNED_SHUTDOWN
    category: external
    title: Плановое отключение водоснабжения
    description: Коммунальщики проводят плановые работы на магистрали
    note: Должно быть объявление в подъезде или на сайте УК
    prior_probability: 0.4
    severity: high
    confirming_factors:
    - SF_NEIGHBORS_NO_WATER
    ruling_out_factors: []
    recommended_actions: []
    resolution: Проверить план работ УК/ресурсника; сообщить жильцу сроки
  - id: C_A2_MAIN_ACCIDENT
    category: external
    title: Авария на магистральном водопроводе
    description: Прорыв или экстренное отключение на магистрали
    note: null
    prior_probability: 0.35
    severity: critical
    confirming_factors:
    - SF_NEIGHBORS_NO_WATER
    ruling_out_factors: []
    recommended_actions: []
    resolution: Заявка аварийной службе; информировать жильца
  - id: C_A3_VALVE_CLOSED
    category: building_itp
    title: Перекрыта задвижка на вводе в дом/подъезд
    description: Задвижка закрыта случайно или намеренно (ремонт)
    note: null
    prior_probability: 0.2
    severity: critical
    confirming_factors:
    - SF_NEIGHBORS_NO_WATER
    ruling_out_factors: []
    recommended_actions: []
    resolution: Слесарь проверяет задвижки на вводе
  - id: C_A4_APT_VALVE
    category: apartment
    title: Перекрыт вентиль в квартире
    description: Жилец или сантехник перекрыл вентиль на вводе в квартиру
    note: Проверяется в первую очередь — просим жильца глянуть под раковину
    prior_probability: 0.05
    severity: high
    confirming_factors: []
    ruling_out_factors:
    - SF_NEIGHBORS_NO_WATER
    recommended_actions: []
    resolution: Попросить жильца проверить вентили под раковиной/в санузле
  default_severity: critical
- id: SYM_B_NO_HOT_COLD_OK
  code: Б
  title: Холодная есть, горячей нет совсем
  description: Холодная вода идёт нормально, из горячего крана — холодная или ничего
  note: null
  hot_tap_temp: cold_like
  cold_water_present: true
  primary_factors:
  - id: F_COLD_OK_HOT_ABSENT
    type: primary
    description: Холодная в норме, горячая отсутствует
    note: null
  secondary_factors:
  - id: SF_B_SCOPE
    type: scope
    description: Проблема только в этой квартире или у соседей тоже
    eliciting_question: У соседей тоже нет горячей?
    note: Ключевой вопрос для выбора маршрута заявки
  - id: SF_B_NOTICE
    type: equipment
    description: Есть ли объявление об отключении в подъезде
    eliciting_question: Вы видели объявление об отключении на двери подъезда?
    note: null
  - id: SF_B_TOWEL_RAIL
    type: secondary
    description: Состояние полотенцесушителя
    eliciting_question: Полотенцесушитель в ванной — горячий или холодный?
    note: Холодный полотенцесушитель = стояк ГВС не работает
  possible_causes:
  - id: C_B1_PLANNED_GVS
    category: external
    title: Плановое отключение ГВС (сезонные работы)
    description: Ежегодные гидравлические испытания тепловых сетей — летнее отключение
    note: В Беларуси/России обычно 2–3 недели летом. Объявление должно быть в подъезде.
    prior_probability: 0.35
    severity: high
    confirming_factors:
    - SF_B_NOTICE
    - SF_B_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Сообщить жильцу дату окончания по плану работ теплосети
  - id: C_B2_ACCIDENT_HEAT
    category: external
    title: Авария на теплотрассе или ИТП
    description: Экстренное отключение ГВС из-за аварии на теплосети
    note: null
    prior_probability: 0.3
    severity: critical
    confirming_factors:
    - SF_B_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Аварийная служба теплосети; заявка диспетчеру
  - id: C_B3_RISER_VALVE
    category: riser
    title: Перекрыт горячий стояк
    description: Задвижка на стояке ГВС закрыта (ремонт, случайность)
    note: null
    prior_probability: 0.2
    severity: high
    confirming_factors:
    - SF_B_SCOPE
    ruling_out_factors:
    - SF_B_NOTICE
    recommended_actions:
    - DA_CHECK_TOWEL_RAIL
    resolution: Слесарь проверяет задвижку стояка ГВС
  - id: C_B4_ITP_FAILURE
    category: building_itp
    title: Неисправность ИТП
    description: Отказ оборудования индивидуального теплового пункта дома
    note: null
    prior_probability: 0.15
    severity: critical
    confirming_factors:
    - SF_B_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Заявка в службу ИТП; выход дежурного инженера
  default_severity: high
- id: SYM_V_HOT_WARM_ONLY
  code: В
  title: Горячая есть, но недостаточно горячая
  description: Из горячего крана идёт тёплая вода — нельзя нормально принять душ
  note: Жилец говорит «тёплая» — значит смешивать с холодной не нужно, но и залезть
    в душ некомфортно
  hot_tap_temp: warm
  cold_water_present: true
  primary_factors:
  - id: F_HOT_WARM_INSUFFICIENT
    type: primary
    description: Горячая вода тёплая, недостаточно горячая для душа
    note: null
  secondary_factors:
  - id: SF_V_WAIT
    type: temporal
    description: Теплеет ли вода если подождать?
    eliciting_question: Если подержать горячий кран открытым 3–5 минут — вода теплеет?
    note: Если теплеет — циркуляция слабая, застой в трубе. Если нет — системная проблема.
  - id: SF_V_SEASON
    type: temporal
    description: Это началось недавно или бывало раньше
    eliciting_question: Это появилось недавно или всегда так бывает в это время года?
    note: null
  - id: SF_V_SCOPE
    type: scope
    description: У соседей такая же ситуация
    eliciting_question: Вы спрашивали у соседей — у них тоже тёплая?
    note: null
  possible_causes:
  - id: C_V1_LOW_SUPPLY_TEMP
    category: external
    title: Низкая температура теплоносителя в подаче
    description: Теплосеть подаёт теплоноситель с пониженной температурой (межсезонье,
      режим экономии)
    note: Типично в переходные периоды — весна/осень. Норма ГВС — не ниже 60°C на
      выходе ИТП.
    prior_probability: 0.3
    severity: medium
    confirming_factors:
    - SF_V_SCOPE
    - SF_V_SEASON
    ruling_out_factors: []
    recommended_actions: []
    resolution: Запрос в теплоснабжающую организацию о температурном графике
  - id: C_V2_PUMP_DEREGULATED
    category: building_itp
    title: Разрегулировка циркуляционного насоса ГВС
    description: Насос работает, но с недостаточной производительностью — вода остывает
      в трубах
    note: null
    prior_probability: 0.25
    severity: medium
    confirming_factors:
    - SF_V_WAIT
    ruling_out_factors: []
    recommended_actions:
    - DA_WAIT_3MIN
    resolution: Заявка в ИТП — наладка насоса циркуляции ГВС
  - id: C_V3_HEAT_EXCHANGER_FOULED
    category: building_itp
    title: Засорение теплообменника ИТП
    description: Накипь или загрязнение снижают теплообмен — ГВС не догревается
    note: Проблема нарастает постепенно — жилец замечает, что «раньше было горячее»
    prior_probability: 0.2
    severity: medium
    confirming_factors:
    - SF_V_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Промывка или замена пластин теплообменника ИТП
  - id: C_V4_COLD_BACKFLOW
    category: neighbor
    title: Подмес холодной воды (обратный переток)
    description: Холодная вода из ХВС-контура проникает в ГВС-стояк, снижая температуру
    note: 'Признак: температура меняется со временем и не зависит от сезона'
    prior_probability: 0.15
    severity: medium
    confirming_factors: []
    ruling_out_factors:
    - SF_V_SEASON
    recommended_actions:
    - DA_WAIT_3MIN
    - DA_CHECK_BOILER
    resolution: 'Поиск источника перетока: обход квартир, проверка бойлеров'
  - id: C_V5_FAR_FROM_RISER
    category: riser
    title: Дальняя квартира от стояка
    description: Квартира подключена далеко от стояка — вода в подводке успевает остыть
    note: 'Диагностируется просто: если после 3-5 минут слива вода теплеет — это оно'
    prior_probability: 0.1
    severity: low
    confirming_factors:
    - SF_V_WAIT
    ruling_out_factors: []
    recommended_actions:
    - DA_WAIT_3MIN
    resolution: Жильцу объяснить проблему; технически — балансировка системы
  default_severity: medium
- id: SYM_G_INTERMITTENT
  code: Г
  title: Горячая то есть, то пропадает
  description: Горячая вода появляется и исчезает без видимой закономерности
  note: null
  hot_tap_temp: cold_like
  cold_water_present: true
  primary_factors:
  - id: F_INTERMITTENT_HOT
    type: primary
    description: Горячая вода периодически пропадает
    note: null
  secondary_factors:
  - id: SF_G_PATTERN
    type: temporal
    description: Есть ли временная закономерность в пропаданиях
    eliciting_question: Это в одно и то же время происходит, или хаотично?
    note: Регулярность = автоматика/насос; хаос = воздушная пробка или переток
  - id: SF_G_NOISE
    type: secondary
    description: Слышны ли звуки в трубах (бульканье, журчание)
    eliciting_question: Слышно ли бульканье или журчание в трубах — особенно в стояке?
    note: Звуки = воздушная пробка или турбулентность из-за перетока
  - id: SF_G_SCOPE
    type: scope
    description: Только в этой квартире или у соседей тоже
    eliciting_question: У соседей такая же история с периодическим пропаданием?
    note: null
  possible_causes:
  - id: C_G1_PUMP_FAULT
    category: building_itp
    title: Неисправность циркуляционного насоса
    description: Насос ГВС работает с перебоями — периодически останавливается или
      теряет производительность
    note: null
    prior_probability: 0.35
    severity: high
    confirming_factors:
    - SF_G_SCOPE
    - SF_G_PATTERN
    ruling_out_factors: []
    recommended_actions: []
    resolution: Заявка в ИТП — диагностика и ремонт насоса циркуляции ГВС
  - id: C_G2_ITP_AUTOMATION
    category: building_itp
    title: Некорректная работа автоматики ИТП
    description: Контроллер ИТП срабатывает неправильно — отключает ГВС по ложному
      сигналу
    note: null
    prior_probability: 0.25
    severity: high
    confirming_factors:
    - SF_G_PATTERN
    - SF_G_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Наладка автоматики ИТП, проверка уставок контроллера
  - id: C_G3_AIR_LOCK
    category: riser
    title: Воздушная пробка в системе
    description: Пузырь воздуха в стояке периодически перекрывает ток воды
    note: Типичный звук — бульканье и gurgling в трубах
    prior_probability: 0.2
    severity: medium
    confirming_factors:
    - SF_G_NOISE
    ruling_out_factors: []
    recommended_actions:
    - DA_OPEN_CLOSE_TAP
    - DA_LISTEN_PIPES
    resolution: Спуск воздуха через воздухоотводчик на стояке — слесарь
  - id: C_G4_BACKFLOW
    category: neighbor
    title: Обратный переток ХВС в ГВС
    description: Холодная вода «продавливается» в горячий стояк — температура скачет
    note: 'Особенность: появляется и исчезает, зависит от того, когда сосед использует
      бойлер'
    prior_probability: 0.2
    severity: medium
    confirming_factors: []
    ruling_out_factors:
    - SF_G_PATTERN
    recommended_actions:
    - DA_CHECK_BOILER
    - DA_CHECK_NEIGHBORS
    resolution: Поиск источника перетока — обход квартир, проверка бойлеров
  default_severity: high
- id: SYM_D_MORNING_ONLY
  code: Д
  title: Утром горячая есть, днём или вечером нет
  description: 'Чёткая суточная закономерность: утром горячая, потом пропадает или
    становится тёплой'
  note: null
  hot_tap_temp: warm
  cold_water_present: true
  primary_factors:
  - id: F_MORNING_OK_DAY_GONE
    type: primary
    description: Горячая утром, пропадает/остывает в течение дня
    note: null
  secondary_factors:
  - id: SF_D_TIME
    type: temporal
    description: В какое время пропадает
    eliciting_question: Примерно в котором часу обычно пропадает?
    note: Если в 7–9 утра и в 18–21 — пиковая нагрузка
  - id: SF_D_BOILER
    type: equipment
    description: Есть ли в доме централизованный бойлер-накопитель
    eliciting_question: У вас в доме есть общий бойлер, или ГВС от теплообменника
      напрямую?
    note: Накопительный бойлер — объёмный ресурс, который «кончается» в часы пик
  - id: SF_D_SCOPE
    type: scope
    description: Соседи жалуются на то же самое
    eliciting_question: У соседей такая же картина — утром есть, потом нет?
    note: null
  possible_causes:
  - id: C_D1_PEAK_LOAD
    category: building_itp
    title: Пиковая нагрузка
    description: В часы пик все жильцы используют ГВС одновременно — ИТП не справляется
    note: Решается балансировкой системы или модернизацией ИТП
    prior_probability: 0.4
    severity: medium
    confirming_factors:
    - SF_D_TIME
    - SF_D_SCOPE
    ruling_out_factors: []
    recommended_actions: []
    resolution: Информировать жильца; заявка диспетчеру для анализа нагрузки
  - id: C_D2_ACCUMULATOR_EMPTY
    category: building_itp
    title: Накопительный бойлер исчерпан
    description: Бойлер-накопитель опустел — нагрев не успевает за потреблением
    note: null
    prior_probability: 0.35
    severity: high
    confirming_factors:
    - SF_D_BOILER
    - SF_D_TIME
    ruling_out_factors: []
    recommended_actions: []
    resolution: 'Проверка бойлера ИТП: ТЭН, терморегулятор, объём'
  - id: C_D3_NEIGHBOR_BOILER_BACKFLOW
    category: neighbor
    title: Обратный переток через бойлер соседа
    description: Сосед использует бойлер в пиковое время — его бойлер даёт переток
      ХВС в ГВС
    note: 'Особенность: жестко привязано к расписанию — утром сосед ещё не встал'
    prior_probability: 0.25
    severity: medium
    confirming_factors:
    - SF_D_TIME
    ruling_out_factors:
    - SF_D_BOILER
    recommended_actions:
    - DA_CHECK_NEIGHBORS
    - DA_CHECK_BOILER
    resolution: Поиск квартиры с бойлером без обратного клапана — обход с слесарем
  default_severity: high
- id: SYM_E_CYCLIC_BACKFLOW
  code: Е
  title: Горячая то холодная, то тёплая — с циклами ~2 часа
  description: Вода в горячем кране периодически становится холодной, через ~2 часа
    возвращается тёплой. Холодная при этом иногда тёплая. Явная цикличность — характерный
    признак обратного перетока.
  note: 'Механизм: чей-то бойлер/нагревательный прибор без обратного клапана нагревает
    воду, давление в ГВС падает, холодная ''продавливается'' в горячий контур. Через
    2 часа бойлер соседа ''насытился'', давление выровнялось — горячая вернулась.'
  hot_tap_temp: cold_like
  cold_water_present: true
  primary_factors:
  - id: F_CYCLIC_COLD_HOT
    type: primary
    description: Горячая то холодная, то тёплая с цикличностью
    note: null
  - id: F_COLD_ALSO_WARM
    type: primary
    description: Холодная вода тоже иногда тёплая
    note: Если холодная тёплая — переток идёт и в обратную сторону; давление в ГВС
      упало
  secondary_factors:
  - id: SF_E_CYCLE_DURATION
    type: temporal
    description: Примерная длительность цикла
    eliciting_question: Как долго длится холодный период — час, два, или по-разному?
    note: Цикл ~2ч = объём бойлера ~80-150л; цикл ~30мин = малый бойлер или смеситель
  - id: SF_E_RECENT_CHANGE
    type: temporal
    description: Изменилось ли что-то в доме недавно
    eliciting_question: Это появилось недавно? Может, знаете — кто-то делал ремонт
      в доме?
    note: Обратный переток часто начинается после установки нового оборудования
  - id: SF_E_BOILER_IN_APT
    type: equipment
    description: Есть ли бойлер в квартире жильца
    eliciting_question: У вас самих есть водонагреватель или бойлер?
    note: Если есть — проверить наличие обратного клапана на его подводке
  - id: SF_E_SCOPE
    type: scope
    description: Затронут весь стояк или только квартира
    eliciting_question: Соседи по стояку жалуются на то же самое?
    note: null
  - id: SF_E_TOWEL_HOT
    type: secondary
    description: Полотенцесушитель горячий в момент проблемы
    eliciting_question: Когда горячая становится холодной — полотенцесушитель при
      этом горячий?
    note: Горячий полотенцесушитель + холодный кран = переток ниже точки подключения
      полотенцесушителя
  possible_causes:
  - id: C_E1_BOILER_NO_CHECK_VALVE
    category: neighbor
    title: Бойлер без обратного клапана у соседа
    description: Кто-то в доме установил водонагреватель без обратного клапана на
      холодном входе. Когда бойлер нагревается — давление внутри растёт, и вода 'продавливается'
      обратно в холодный контур, а оттуда — в горячий стояк.
    note: 'Простая аналогия для жильца: ''Представьте, что у соседа чайник подключён
      прямо к трубе — когда он кипит, пар идёт к вам''. Обратный клапан — это ''дверь
      с пружиной''.'
    prior_probability: 0.45
    severity: high
    confirming_factors:
    - SF_E_RECENT_CHANGE
    - SF_E_SCOPE
