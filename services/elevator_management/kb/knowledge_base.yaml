  - id: C_ELEV_POWER_CUT
    category: external
    title: Отключение электроэнергии
    description: Пропало напряжение на вводе в дом.
    prior_probability: 0.3
    severity: high
    confirming_factors:
    - SF_ELEV_LIGHT
    ruling_out_factors: []
    recommended_actions: []
