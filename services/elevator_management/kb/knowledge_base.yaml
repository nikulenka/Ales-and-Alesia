    description: Есть ли внутри люди?
    eliciting_question: Вы находитесь внутри кабины? Сколько вас человек?
  - id: SF_ELEV_LIGHT
    type: equipment
    description: Есть ли свет в кабине?
    eliciting_question: Свет в кабине горит или полностью темно?
  possible_causes:
  - id: C_ELEV_DOORS
    category: equipment
